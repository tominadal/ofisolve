version: '3.8'

services:
  # Base de Datos Relacional (SSOT)
  postgres:
    image: postgres:15-alpine
    container_name: ofisolve_db
    restart: always
    environment:
      POSTGRES_USER: ofisolve_user
      POSTGRES_PASSWORD: ofisolve_password
      POSTGRES_DB: ofisolve_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Base de Datos de Vectores (RAG)
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: ofisolve_chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data
    environment:
      - ANONYMIZED_TELEMETRY=False

  # Cache y Mensajería (Streaming / Memoria)
  redis:
    image: redis:7-alpine
    container_name: ofisolve_redis
    restart: always
    ports:
      - "6379:6379"

  # Backend FastAPI
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ofisolve_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATABASE_URL=postgresql+asyncpg://ofisolve_user:ofisolve_password@postgres:5432/ofisolve_db
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    depends_on:
      - postgres
      - chroma
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend/ui
      dockerfile: Dockerfile
    container_name: ofisolve_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
